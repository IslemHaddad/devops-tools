---
- name: Install Kubernetes with containerd
  hosts: kubernetes-master
  become: yes
  vars:
    kubernetes_version: "1.34.0-00"
    containerd_version: "2.2.1"
    containerd_tarball: "containerd-{{ containerd_version }}-linux-amd64.tar.gz"
    containerd_url: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/{{ containerd_tarball }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Stop swap even after reboot
      replace:
        path: /etc/fstab
        regexp: '^\s*(/)?(swap|swap\.img|swapfile)\b'
        replace: '# \g<0>'

    - name: Disable swap
      command: swapoff -a

    - name: Apply sysctl params required by setup (persist across reboots)
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.ipv4.ip_forward = 1
        owner: root
        group: root
        mode: '0644'

    - name: Apply sysctl params without reboot
      command: sysctl --system

    - name: Verify net.ipv4.ip_forward is 1
      command: sysctl -n net.ipv4.ip_forward
      register: ip_forward_value

    - name: Print net.ipv4.ip_forward value
      debug:
        msg: "net.ipv4.ip_forward = {{ ip_forward_value.stdout }}"

    - name: Install prerequisites
      apt:
        name:
          - curl
          - tar
          - runc
        state: present
        update_cache: yes

    - name: Download containerd tarball
      get_url:
        url: "{{ containerd_url }}"
        dest: "/tmp/{{ containerd_tarball }}"
        mode: '0644'

    - name: Extract containerd tarball
      unarchive:
        src: "/tmp/{{ containerd_tarball }}"
        dest: /usr/local
        remote_src: yes

    - name: Ensure containerd config directory exists
      file:
        path: /etc/containerd
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Create containerd systemd service file
      copy:
        dest: /etc/systemd/system/containerd.service
        content: |
          [Unit]
          Description=containerd container runtime
          Documentation=https://containerd.io
          After=network.target

          [Service]
          ExecStart=/usr/local/bin/containerd
          Type=notify
          Restart=always
          Delegate=yes
          KillMode=process
          ExecStartPre=/sbin/modprobe overlay
          ExecStartPre=/sbin/modprobe br_netfilter
          LimitNOFILE=1048576
          LimitNPROC=infinity
          LimitCORE=infinity

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start containerd service
      systemd:
        name: containerd
        enabled: yes
        state: started

    - name: Replace containerd config with default
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Ensure SystemdCgroup = true in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'

    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Ensure /etc/apt/keyrings exists
      file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Add Kubernetes GPG key
      get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes-apt-key.asc
        mode: '0644'

    - name: Convert GPG key to binary format
      command: gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg /etc/apt/keyrings/kubernetes-apt-key.asc
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repository
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /"
        owner: root
        group: root
        mode: '0644'

    - name: Update apt cache after adding Kubernetes repo
      apt:
        update_cache: yes

    - name: Install kubelet, kubeadm, kubectl
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present

    - name: Hold kubelet, kubeadm and kubectl at current version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Enable kubelet service
      systemd:
        name: kubelet
        enabled: true
        state: started

  handlers:
    - name: Clean up extracted tar
      file:
        path: "/tmp/containerd"
        state: absent
